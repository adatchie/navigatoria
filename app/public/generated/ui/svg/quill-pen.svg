<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Quill pen with ink -->
  <defs>
    <linearGradient id="feather" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4e8c1" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#d4c4a0" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#a08050" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="nib" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b6508"/>
      <stop offset="100%" stop-color="#2c1810"/>
    </linearGradient>
  </defs>
  
  <!-- Feather shaft -->
  <line x1="85" y1="85" x2="20" y2="20" stroke="#a08050" stroke-width="1.5" opacity="0.8"/>
  
  <!-- Feather vane - left barbs -->
  <path d="M80,80 Q60,55 25,25" fill="url(#feather)" opacity="0.3"/>
  <path d="M75,82 L35,30 L50,28 L78,72 Z" fill="url(#feather)" opacity="0.2"/>
  
  <!-- Feather barbs left -->
  <g stroke="#d4c4a0" stroke-width="0.4" opacity="0.4">
    <line x1="75" y1="75" x2="40" y2="32"/>
    <line x1="70" y1="70" x2="42" y2="38"/>
    <line x1="65" y1="65" x2="45" y2="42"/>
    <line x1="60" y1="60" x2="48" y2="45"/>
    <line x1="55" y1="55" x2="42" y2="48"/>
    <line x1="50" y1="50" x2="38" y2="50"/>
  </g>
  
  <!-- Feather barbs right -->
  <g stroke="#d4c4a0" stroke-width="0.4" opacity="0.3">
    <line x1="72" y1="78" x2="55" y2="22"/>
    <line x1="66" y1="74" x2="52" y2="25"/>
    <line x1="60" y1="70" x2="50" y2="30"/>
    <line x1="55" y1="65" x2="48" y2="35"/>
    <line x1="50" y1="60" x2="42" y2="40"/>
  </g>
  
  <!-- Outer feather edge left -->
  <path d="M35,30 Q30,28 25,32 Q22,36 28,42" fill="url(#feather)" opacity="0.25"/>
  
  <!-- Nib -->
  <path d="M85,85 L92,95 L88,90 L85,95 L82,90 L78,95 Z" fill="url(#nib)"/>
  <line x1="85" y1="85" x2="85" y2="95" stroke="#2c1810" stroke-width="0.3" opacity="0.5"/>
  
  <!-- Ink drop at nib -->
  <ellipse cx="85" cy="97" rx="2" ry="3" fill="#2c1810" opacity="0.6"/>
</svg>
