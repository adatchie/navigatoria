<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navigatoria — Ocean / Dark Compass</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Serif+JP:wght@300;400;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #080b10;
  --bg: #0d1117;
  --bg-card: #1c2230;
  --border: #30363d;
  --border-accent: #c9975c;
  --text: #d1d5db;
  --text-dim: #6e7681;
  --text-bright: #f0f3f6;
  --candle: #f5deb3;
  --candle-dim: #a08050;
  --brass: #c9975c;
  --brass-bright: #e8b86d;
}

body {
  font-family: 'Noto Serif JP', serif;
  background: #060a0f;
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  position: relative;
}

/* Ocean */
.ocean-bg {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(180deg, #0f1a2e 0%, #0a1220 40%, #060d18 70%, #040810 100%);
}
.ocean-bg::after {
  content: '';
  position: absolute;
  top: 30%; left: 20%;
  width: 400px; height: 200px;
  background: radial-gradient(ellipse, rgba(245,222,179,0.03) 0%, transparent 60%);
  pointer-events: none;
}

/* === Top bar === */
.top-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 20px;
  background: linear-gradient(180deg, rgba(13,17,23,0.95), rgba(13,17,23,0.7));
  border-bottom: 1px solid rgba(201,151,92,0.2);
}

.date-block {
  display: flex;
  align-items: baseline;
  gap: 12px;
}

.date-main {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  color: var(--candle);
  letter-spacing: 2px;
  text-shadow: 0 0 15px rgba(245,222,179,0.1);
}

.date-sub {
  font-size: 11px;
  color: var(--text-dim);
}

.speed-group {
  display: flex;
  gap: 4px;
}

.btn-spd {
  background: transparent;
  color: var(--text-dim);
  border: 1px solid var(--border);
  padding: 3px 10px;
  font-family: 'Playfair Display', serif;
  font-size: 11px;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
}
.btn-spd.active {
  border-color: var(--brass);
  color: var(--candle);
  background: rgba(201,151,92,0.08);
  box-shadow: 0 0 6px rgba(201,151,92,0.1);
}
.btn-spd:hover {
  border-color: var(--brass);
  color: var(--brass-bright);
}

/* === Navigation readout — right === */
.nav-readout {
  position: absolute;
  top: 54px;
  right: 20px;
  z-index: 10;
  background: rgba(13,17,23,0.85);
  border: 1px solid rgba(201,151,92,0.15);
  border-radius: 4px;
  padding: 12px 16px;
  min-width: 180px;
  backdrop-filter: blur(6px);
}

.readout-row {
  display: flex;
  justify-content: space-between;
  padding: 3px 0;
  border-bottom: 1px solid rgba(48,54,61,0.5);
}
.readout-row:last-child { border-bottom: none; }

.readout-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--brass);
  opacity: 0.6;
}

.readout-val {
  font-size: 12px;
  color: var(--candle);
  font-weight: 700;
  font-family: 'Playfair Display', serif;
}

/* === Compass — bottom right === */
.compass-wrap {
  position: absolute;
  bottom: 110px;
  right: 24px;
  z-index: 10;
}

.compass-ring {
  width: 90px; height: 90px;
  border: 2px solid var(--brass);
  border-radius: 50%;
  background: rgba(13,17,23,0.85);
  position: relative;
  box-shadow: 0 0 20px rgba(0,0,0,0.4), inset 0 0 20px rgba(0,0,0,0.3), 0 0 8px rgba(201,151,92,0.08);
  backdrop-filter: blur(6px);
}

.compass-dir {
  position: absolute;
  font-size: 9px;
  font-family: 'Playfair Display', serif;
}
.compass-dir.n { top: 7px; left: 50%; transform: translateX(-50%); color: var(--candle); font-weight: 700; }
.compass-dir.s { bottom: 7px; left: 50%; transform: translateX(-50%); color: var(--text-dim); }
.compass-dir.e { right: 7px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
.compass-dir.w { left: 7px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }

.compass-needle {
  position: absolute;
  top: 50%; left: 50%;
  width: 2px; height: 34px;
  transform-origin: top center;
  transform: translate(-50%, 0) rotate(225deg);
  margin-top: 11px;
}
.compass-needle::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 2px; height: 17px;
  background: var(--candle);
}
.compass-needle::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 2px; height: 17px;
  background: var(--text-dim);
}

.compass-bearing {
  text-align: center;
  margin-top: 6px;
  font-size: 11px;
  color: var(--brass);
  letter-spacing: 1px;
}

/* === Sail control — bottom left === */
.sail-panel {
  position: absolute;
  bottom: 110px;
  left: 20px;
  z-index: 10;
  background: rgba(13,17,23,0.85);
  border: 1px solid rgba(201,151,92,0.15);
  border-radius: 4px;
  padding: 12px 16px;
  backdrop-filter: blur(6px);
}

.sail-title {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--brass);
  opacity: 0.5;
  margin-bottom: 8px;
}

.sail-track {
  width: 140px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  position: relative;
  margin-bottom: 8px;
}

.sail-fill {
  width: 50%;
  height: 100%;
  background: var(--brass);
  border-radius: 2px;
}

.sail-knob {
  position: absolute;
  right: -1px;
  top: 50%;
  width: 12px; height: 12px;
  background: var(--brass-bright);
  border-radius: 50%;
  transform: translate(50%, -50%);
  box-shadow: 0 0 6px rgba(201,151,92,0.3);
}

.sail-btns {
  display: flex;
  gap: 3px;
}

.btn-sl {
  background: transparent;
  color: var(--text-dim);
  border: 1px solid var(--border);
  padding: 3px 8px;
  font-size: 10px;
  cursor: pointer;
  border-radius: 2px;
  font-family: 'Noto Serif JP', serif;
  transition: all 0.15s;
}
.btn-sl:hover {
  border-color: var(--brass);
  color: var(--brass-bright);
}

/* === Ship fleet bar — bottom === */
.fleet-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  display: flex;
  gap: 1px;
  padding: 0 16px 8px;
}

.fleet-card {
  flex: 1;
  background: rgba(13,17,23,0.85);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 8px 12px;
  backdrop-filter: blur(4px);
  transition: border-color 0.2s;
}
.fleet-card:hover {
  border-color: rgba(201,151,92,0.3);
}
.fleet-card.flag {
  border-color: rgba(201,151,92,0.3);
  box-shadow: inset 0 0 12px rgba(201,151,92,0.04);
}

.fleet-card-top {
  display: flex;
  justify-content: space-between;
  margin-bottom: 4px;
}

.fleet-name {
  font-size: 12px;
  color: var(--candle);
  font-weight: 700;
}

.fleet-role {
  font-size: 9px;
  color: var(--brass);
  opacity: 0.5;
  letter-spacing: 1px;
}

.fleet-stats {
  display: flex;
  gap: 8px;
  font-size: 10px;
  color: var(--text-dim);
}

/* === Event overlay === */
.event-overlay {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 20;
  background: rgba(13,17,23,0.95);
  border: 1px solid var(--brass);
  border-radius: 4px;
  padding: 20px 32px;
  text-align: center;
  min-width: 280px;
  box-shadow: 0 0 30px rgba(0,0,0,0.5), 0 0 10px rgba(201,151,92,0.08);
  backdrop-filter: blur(8px);
}

.event-overlay::before {
  content: '';
  position: absolute;
  top: -10px; right: -10px;
  width: 80px; height: 80px;
  background: radial-gradient(ellipse, rgba(245,222,179,0.06) 0%, transparent 70%);
  pointer-events: none;
}

.event-icon {
  font-size: 20px;
  margin-bottom: 8px;
}

.event-text {
  font-size: 14px;
  color: var(--candle);
  line-height: 1.7;
  margin-bottom: 14px;
}

.btn-event-close {
  background: transparent;
  color: var(--brass);
  border: 1px solid var(--brass);
  padding: 5px 24px;
  font-family: 'Noto Serif JP', serif;
  font-size: 12px;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
}
.btn-event-close:hover {
  background: rgba(201,151,92,0.08);
  box-shadow: 0 0 6px rgba(201,151,92,0.15);
}

/* Quest button */
.quest-btn {
  position: absolute;
  top: 54px;
  left: 20px;
  z-index: 10;
  background: rgba(13,17,23,0.85);
  color: var(--brass);
  border: 1px solid rgba(201,151,92,0.2);
  padding: 5px 14px;
  font-family: 'Noto Serif JP', serif;
  font-size: 11px;
  cursor: pointer;
  border-radius: 3px;
  backdrop-filter: blur(4px);
  transition: all 0.15s;
}
.quest-btn:hover {
  border-color: var(--brass);
  box-shadow: 0 0 6px rgba(201,151,92,0.1);
}
</style>
</head>
<body>

<div class="ocean-bg"></div>

<div class="top-bar">
  <div class="date-block">
    <span class="date-main">1522年 1月 1日</span>

  <div class="sail-track">

<div class="compass-wrap">

</div>

</body>
</html>
