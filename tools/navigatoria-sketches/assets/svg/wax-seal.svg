<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Wax seal — deep red with press impression -->
  <defs>
    <radialGradient id="wax" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#c0392b" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#a04040" stop-opacity="0.85"/>
      <stop offset="70%" stop-color="#8b1a1a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5c1010" stop-opacity="0.95"/>
    </radialGradient>
    <radialGradient id="shine" cx="35%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#e8a0a0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a04040" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Irregular wax blob shape -->
  <path d="M40,5 Q55,3 62,12 Q72,22 73,35 Q78,48 70,58 Q65,68 55,72 Q45,78 35,74 Q22,75 14,65 Q5,55 5,42 Q3,30 10,20 Q18,10 28,6 Z" 
        fill="url(#wax)"/>
  
  <!-- Shine highlight -->
  <ellipse cx="32" cy="28" rx="15" ry="12" fill="url(#shine)"/>
  
  <!-- Press impression ring -->
  <circle cx="40" cy="40" r="22" fill="none" stroke="#5c1010" stroke-width="1" opacity="0.4"/>
  <circle cx="40" cy="40" r="18" fill="none" stroke="#5c1010" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Inner design — anchor symbol -->
  <g transform="translate(40,38)" fill="none" stroke="#3c0808" stroke-width="1.5" opacity="0.5">
    <!-- Anchor shaft -->
    <line x1="0" y1="-10" x2="0" y2="10"/>
    <!-- Cross bar -->
    <line x1="-6" y1="-4" x2="6" y2="-4"/>
    <!-- Top ring -->
    <circle cx="0" cy="-13" r="3"/>
    <!-- Bottom curve left -->
    <path d="M-10,6 Q-10,14 0,10"/>
    <!-- Bottom curve right -->
    <path d="M10,6 Q10,14 0,10"/>
  </g>
  
  <!-- Edge drip details -->
  <path d="M62,12 Q66,16 64,22" fill="#a04040" opacity="0.4" stroke="none"/>
  <path d="M14,65 Q10,60 12,54" fill="#8b1a1a" opacity="0.3" stroke="none"/>
</svg>
