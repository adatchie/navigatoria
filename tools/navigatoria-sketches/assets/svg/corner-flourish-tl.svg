<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <!-- Corner flourish — top-left, rotate for other corners -->
  <defs>
    <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a843" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8b6508" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  
  <!-- Main scroll curve -->
  <path d="M0,0 Q20,2 25,15 Q28,25 20,30" fill="none" stroke="url(#cg)" stroke-width="1.5"/>
  
  <!-- Inner curve -->
  <path d="M0,5 Q15,7 18,15 Q20,22 15,26" fill="none" stroke="#b8860b" stroke-width="0.5" opacity="0.4"/>
  
  <!-- Scroll end curl -->
  <circle cx="20" cy="30" r="4" fill="none" stroke="#b8860b" stroke-width="0.8" opacity="0.5"/>
  <circle cx="20" cy="30" r="1.5" fill="#d4a843" opacity="0.3"/>
  
  <!-- Small accent leaf -->
  <path d="M5,0 Q8,5 5,10 Q2,5 5,0" fill="#b8860b" opacity="0.15"/>
</svg>
