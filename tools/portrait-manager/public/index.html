<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="cache-control" content="no-store" />
    <title>顔グラ生成</title>
    <link rel="stylesheet" href="/styles.css?v=portrait-sidebar-20260509" />
  </head>
  <body>
    <div class="workbench">
      <header class="topbar">
        <div>
          <h1>顔グラ生成</h1>
          <p id="summary">0件</p>
        </div>
        <div class="top-actions">
          <button id="createImageThreadButton" type="button">画像スレッド作成</button>
          <button id="refreshJobButton" type="button">状況更新</button>
          <button id="generateAllButton" class="primary" type="button">承認分を画像スレッドへ送信</button>
          <button id="clearAllButton" type="button">全消去</button>
        </div>
      </header>

      <aside class="input-column">
        <section class="panel status-panel">
          <h2>画像専用スレッド</h2>
          <p id="threadStatus" class="status-line">未接続</p>
          <p id="jobStatus" class="status-line">待機中</p>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>属性案作成</h2>
            <button id="approveAllCandidatesButton" class="ghost" type="button">全承認</button>
          </div>
          <label class="field">
            <span>作成数</span>
            <input id="candidateCountInput" type="number" min="1" max="80" value="48" />
          </label>
          <div class="button-row">
            <button id="generateCandidatesButton" class="primary" type="button">被りなし候補を作成</button>
            <button id="addCandidateButton" type="button">1件追加</button>
          </div>
          <div id="candidates" class="candidate-list"></div>
        </section>

        <section class="panel">
          <h2>単体入力</h2>
          <div class="two-col">
            <label class="field">
              <span>役職</span>
              <select id="roleInput"></select>
            </label>
            <label class="field">
              <span>国籍</span>
              <select id="nationalityInput"></select>
            </label>
          </div>
          <div class="two-col">
            <label class="field">
              <span>街</span>
              <input id="portInput" autocomplete="off" />
            </label>
            <label class="field">
              <span>年齢</span>
              <select id="ageInput"></select>
            </label>
          </div>
          <div class="two-col">
            <label class="field">
              <span>服飾年代</span>
              <select id="periodInput"></select>
            </label>
            <label class="field">
              <span>顔向き</span>
              <select id="faceAngleInput"></select>
            </label>
          </div>
          <label class="field">
            <span>性別</span>
            <select id="genderInput"></select>
          </label>
          <label class="field">
            <span>設定</span>
            <textarea id="settingInput" rows="4" spellcheck="false"></textarea>
          </label>
          <label class="field">
            <span>表情・雰囲気</span>
            <input id="moodInput" autocomplete="off" />
          </label>
          <button id="addSingleButton" class="primary wide" type="button">画像生成へ進む</button>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>一括入力</h2>
            <button id="clearRowsButton" class="ghost" type="button">クリア</button>
          </div>
          <textarea id="rowsInput" rows="10" spellcheck="false"></textarea>
          <div class="button-row">
            <button id="previewRowsButton" type="button">確認</button>
            <button id="addRowsButton" class="primary" type="button">まとめて追加</button>
          </div>
          <div id="rowPreview" class="row-preview"></div>
        </section>
      </aside>

      <main class="output-column">
        <div class="output-head">
          <h2>承認済み</h2>
          <label class="field compact">
            <span>検索</span>
            <input id="searchInput" type="search" autocomplete="off" />
          </label>
        </div>
        <div id="cards" class="cards"></div>

        <section class="db-section">
          <div class="output-head">
            <div>
              <h2>顔グラDB</h2>
              <p id="recordSummary" class="section-count">0件</p>
            </div>
            <div class="db-actions">
              <label class="field compact">
                <span>DB検索</span>
                <input id="recordSearchInput" type="search" autocomplete="off" />
              </label>
              <button id="refreshRecordsButton" type="button">DB更新</button>
            </div>
          </div>
          <div id="records" class="records"></div>
        </section>

        <section class="db-section">
          <div class="output-head">
            <div>
              <h2>生成画像フォルダ</h2>
              <p id="imageSummary" class="section-count">0件</p>
            </div>
            <button id="refreshImagesButton" type="button">画像更新</button>
          </div>
          <div id="generatedImages" class="image-grid"></div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" role="status"></div>
    <script type="module" src="/app.js?v=portrait-folder-preview-20260509"></script>
  </body>
</html>
